<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 4px;
      color: #1a1a2e;
    }
    .generated-at {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* 期間タブ */
    .period-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .period-tab {
      padding: 6px 16px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .period-tab.active {
      background: #0078d4;
      color: #fff;
      border-color: #0078d4;
    }
    /* 円グラフ凡例テーブル */
    .legend-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 0.85rem;
    }
    .legend-table th {
      text-align: left;
      padding: 6px 8px;
      background: #f5f5f5;
      border-bottom: 2px solid #e0e0e0;
      color: #555;
    }
    .legend-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .legend-table tfoot td {
      font-weight: bold;
      border-top: 2px solid #e0e0e0;
      background: #fafafa;
    }
    .color-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
    }
    /* 棒グラフ期間切替 */
    .bar-selector {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      background: #fff;
      cursor: pointer;
    }
    /* 進捗バー */
    .progress-item {
      margin-bottom: 16px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .progress-bar-bg {
      background: #e9ecef;
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }
    .progress-over { background: #e74c3c; }
    /* ログテーブル */
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .log-table th {
      padding: 8px 10px;
      background: #f5f5f5;
      border-bottom: 2px solid #e0e0e0;
      text-align: left;
      color: #555;
      white-space: nowrap;
    }
    .log-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .log-table tr:hover td { background: #f9fbff; }
    .project-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.78rem;
      color: #fff;
      font-weight: 500;
    }
    .full-width { grid-column: 1 / -1; }
    canvas { max-height: 280px; }
  </style>

  <!-- =====================================================
       Power Automate がこの script ブロック内のプレースホルダーを
       実データの JSON に置換してファイルを保存します。
       手動テスト用にサンプルデータが入っています。
  ====================================================== -->
  <script>
    // Power Automate が置換するデータ（プレースホルダー: /* LOGS_DATA_JSON */ など）
    const WORK_LOGS = /* LOGS_DATA_JSON */[
      {
        "Title": "週次定例ミーティング",
        "EventId": "sample_001",
        "StartDateTime": "2026-03-10T10:00:00",
        "EndDateTime": "2026-03-10T11:00:00",
        "DurationHours": 1,
        "ProjectCode": "proj_a",
        "ProjectName": "プロジェクトA",
        "RecordedAt": "2026-03-10T10:05:00"
      },
      {
        "Title": "要件定義レビュー",
        "EventId": "sample_002",
        "StartDateTime": "2026-03-11T13:00:00",
        "EndDateTime": "2026-03-11T15:00:00",
        "DurationHours": 2,
        "ProjectCode": "proj_b",
        "ProjectName": "プロジェクトB",
        "RecordedAt": "2026-03-11T13:05:00"
      },
      {
        "Title": "設計書レビュー",
        "EventId": "sample_003",
        "StartDateTime": "2026-03-12T10:00:00",
        "EndDateTime": "2026-03-12T11:30:00",
        "DurationHours": 1.5,
        "ProjectCode": "proj_a",
        "ProjectName": "プロジェクトA",
        "RecordedAt": "2026-03-12T10:05:00"
      },
      {
        "Title": "クライアント打ち合わせ",
        "EventId": "sample_004",
        "StartDateTime": "2026-03-13T14:00:00",
        "EndDateTime": "2026-03-13T15:00:00",
        "DurationHours": 1,
        "ProjectCode": "proj_c",
        "ProjectName": "プロジェクトC",
        "RecordedAt": "2026-03-13T14:05:00"
      },
      {
        "Title": "スプリント計画",
        "EventId": "sample_005",
        "StartDateTime": "2026-02-28T09:00:00",
        "EndDateTime": "2026-02-28T11:00:00",
        "DurationHours": 2,
        "ProjectCode": "proj_b",
        "ProjectName": "プロジェクトB",
        "RecordedAt": "2026-02-28T09:05:00"
      },
      {
        "Title": "月次報告資料作成",
        "EventId": "sample_006",
        "StartDateTime": "2026-02-25T15:00:00",
        "EndDateTime": "2026-02-25T17:00:00",
        "DurationHours": 2,
        "ProjectCode": "proj_a",
        "ProjectName": "プロジェクトA",
        "RecordedAt": "2026-02-25T15:05:00"
      }
    ];

    const PROJECTS = /* PROJECTS_DATA_JSON */[
      { "Title": "プロジェクトA", "ProjectCode": "proj_a", "Color": "#FF6384", "PlannedHours": 100, "IsActive": true },
      { "Title": "プロジェクトB", "ProjectCode": "proj_b", "Color": "#36A2EB", "PlannedHours": 80,  "IsActive": true },
      { "Title": "プロジェクトC", "ProjectCode": "proj_c", "Color": "#FFCE56", "PlannedHours": 60,  "IsActive": true }
    ];

    const GENERATED_AT = "/* GENERATED_AT */2026-03-13T06:00:00Z";
  </script>
</head>
<body>

<h1>📊 工数ダッシュボード</h1>
<div class="generated-at" id="generatedAt"></div>

<div class="grid">

  <!-- ① 期間別プロジェクト別工数（円グラフ） -->
  <div class="card">
    <div class="card-title">🥧 プロジェクト別工数</div>
    <div class="period-tabs">
      <button class="period-tab active" data-period="week">今週</button>
      <button class="period-tab" data-period="month">今月</button>
      <button class="period-tab" data-period="year">今年</button>
    </div>
    <canvas id="pieChart"></canvas>
    <table class="legend-table" id="pieLegendTable">
      <thead>
        <tr><th>プロジェクト</th><th>時間</th><th>割合</th></tr>
      </thead>
      <tbody id="pieLegendBody"></tbody>
      <tfoot>
        <tr>
          <td>合計</td>
          <td id="pieTotalHours">-</td>
          <td>100%</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- ② 週・月別工数推移（棒グラフ） -->
  <div class="card">
    <div class="card-title">📈 工数推移</div>
    <select class="bar-selector" id="barSelector">
      <option value="week">週別（過去8週）</option>
      <option value="month">月別（過去12ヶ月）</option>
    </select>
    <canvas id="barChart"></canvas>
  </div>

  <!-- ③ プロジェクト別進捗率 -->
  <div class="card">
    <div class="card-title">🎯 プロジェクト進捗率</div>
    <div id="progressContainer"></div>
  </div>

  <!-- ④ 工数詳細ログ一覧（フルワイド） -->
  <div class="card full-width">
    <div class="card-title">📋 工数詳細ログ</div>
    <div style="overflow-x:auto;">
      <table class="log-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>予定名</th>
            <th>プロジェクト</th>
            <th>時間</th>
          </tr>
        </thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ============================================================
// ユーティリティ
// ============================================================
const projectMap = {};
PROJECTS.forEach(p => { projectMap[p.ProjectCode] = p; });

function parseDate(str) {
  return new Date(str);
}

// 期間フィルター
function getRange(period) {
  const now = new Date();
  const start = new Date(now);
  if (period === 'week') {
    const day = now.getDay(); // 0=Sun
    const diff = day === 0 ? 6 : day - 1; // 月曜始まり
    start.setDate(now.getDate() - diff);
    start.setHours(0, 0, 0, 0);
  } else if (period === 'month') {
    start.setDate(1);
    start.setHours(0, 0, 0, 0);
  } else if (period === 'year') {
    start.setMonth(0, 1);
    start.setHours(0, 0, 0, 0);
  }
  return start;
}

function filterLogs(period) {
  const start = getRange(period);
  return WORK_LOGS.filter(log => parseDate(log.StartDateTime) >= start);
}

// ============================================================
// 生成日時の表示
// ============================================================
(function() {
  const el = document.getElementById('generatedAt');
  try {
    const d = new Date(GENERATED_AT);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    el.textContent = `最終更新: ${jst.toISOString().replace('T', ' ').substring(0, 16)} JST`;
  } catch(e) {
    el.textContent = `最終更新: ${GENERATED_AT}`;
  }
})();

// ============================================================
// ① 円グラフ
// ============================================================
let pieChart = null;

function buildPieData(period) {
  const logs = filterLogs(period);
  const totals = {};
  logs.forEach(log => {
    totals[log.ProjectCode] = (totals[log.ProjectCode] || 0) + Number(log.DurationHours);
  });

  const activeProjects = PROJECTS.filter(p => p.IsActive);
  const labels = [];
  const data = [];
  const colors = [];

  activeProjects.forEach(p => {
    const h = totals[p.ProjectCode] || 0;
    if (h > 0) {
      labels.push(p.Title);
      data.push(Math.round(h * 100) / 100);
      colors.push(p.Color || '#ccc');
    }
  });

  return { labels, data, colors };
}

function renderPie(period) {
  const { labels, data, colors } = buildPieData(period);
  const total = data.reduce((a, b) => a + b, 0);

  // 凡例テーブル更新
  const tbody = document.getElementById('pieLegendBody');
  tbody.innerHTML = '';
  labels.forEach((label, i) => {
    const pct = total > 0 ? ((data[i] / total) * 100).toFixed(1) : '0.0';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="color-dot" style="background:${colors[i]}"></span>${label}</td>
      <td>${data[i]}h</td>
      <td>${pct}%</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('pieTotalHours').textContent = `${Math.round(total * 100) / 100}h`;

  // グラフ更新
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) { pieChart.destroy(); }

  if (data.length === 0) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.font = '14px Segoe UI';
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'center';
    ctx.fillText('この期間のデータはありません', ctx.canvas.width / 2, 120);
    return;
  }

  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const val = ctx.parsed;
              const pct = ((val / total) * 100).toFixed(1);
              return ` ${ctx.label}: ${val}h (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

// 期間タブのイベント
document.querySelectorAll('.period-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderPie(this.dataset.period);
  });
});

renderPie('week'); // 初期表示

// ============================================================
// ② 棒グラフ（週別 / 月別）
// ============================================================
let barChart = null;

function getWeekLabel(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? 6 : day - 1;
  const mon = new Date(d);
  mon.setDate(d.getDate() - diff);
  const mm = String(mon.getMonth() + 1).padStart(2, '0');
  const dd = String(mon.getDate()).padStart(2, '0');
  return `${mm}/${dd}週`;
}

function getMonthLabel(date) {
  const d = new Date(date);
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function buildBarData(mode) {
  const now = new Date();
  const periodCount = mode === 'week' ? 8 : 12;
  const buckets = {};
  const bucketOrder = [];

  for (let i = periodCount - 1; i >= 0; i--) {
    const d = new Date(now);
    if (mode === 'week') {
      d.setDate(d.getDate() - i * 7);
      const key = getWeekLabel(d);
      if (!buckets[key]) { buckets[key] = {}; bucketOrder.push(key); }
    } else {
      d.setMonth(d.getMonth() - i);
      const key = getMonthLabel(d);
      if (!buckets[key]) { buckets[key] = {}; bucketOrder.push(key); }
    }
  }

  WORK_LOGS.forEach(log => {
    const d = parseDate(log.StartDateTime);
    const key = mode === 'week' ? getWeekLabel(d) : getMonthLabel(d);
    if (buckets[key]) {
      buckets[key][log.ProjectCode] = (buckets[key][log.ProjectCode] || 0) + Number(log.DurationHours);
    }
  });

  const datasets = PROJECTS.filter(p => p.IsActive).map(p => ({
    label: p.Title,
    data: bucketOrder.map(k => Math.round((buckets[k][p.ProjectCode] || 0) * 100) / 100),
    backgroundColor: p.Color || '#ccc'
  }));

  return { labels: bucketOrder, datasets };
}

function renderBar(mode) {
  const { labels, datasets } = buildBarData(mode);
  const ctx = document.getElementById('barChart').getContext('2d');
  if (barChart) { barChart.destroy(); }
  barChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}h`
          }
        }
      },
      scales: {
        x: { stacked: true },
        y: {
          stacked: true,
          ticks: { callback: v => `${v}h` },
          title: { display: true, text: '工数（時間）' }
        }
      }
    }
  });
}

document.getElementById('barSelector').addEventListener('change', function() {
  renderBar(this.value);
});

renderBar('week'); // 初期表示

// ============================================================
// ③ 進捗率
// ============================================================
(function() {
  const container = document.getElementById('progressContainer');
  const totals = {};
  WORK_LOGS.forEach(log => {
    totals[log.ProjectCode] = (totals[log.ProjectCode] || 0) + Number(log.DurationHours);
  });

  PROJECTS.filter(p => p.IsActive).forEach(p => {
    const actual = totals[p.ProjectCode] || 0;
    const planned = p.PlannedHours || 0;
    const pct = planned > 0 ? Math.min((actual / planned) * 100, 100) : 0;
    const isOver = planned > 0 && actual > planned;
    const overPct = planned > 0 && actual > planned ? ((actual / planned) * 100).toFixed(1) : null;

    const div = document.createElement('div');
    div.className = 'progress-item';
    div.innerHTML = `
      <div class="progress-header">
        <span>
          <span class="color-dot" style="background:${p.Color}"></span>
          ${p.Title}
        </span>
        <span>
          ${actual}h / ${planned > 0 ? planned + 'h' : '未設定'}
          ${overPct ? `<span style="color:#e74c3c;font-size:0.8em"> (${overPct}%)</span>` : ''}
        </span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill ${isOver ? 'progress-over' : ''}"
             style="width:${pct}%; background:${isOver ? '' : p.Color}">
        </div>
      </div>
    `;
    container.appendChild(div);
  });
})();

// ============================================================
// ④ 工数詳細ログテーブル
// ============================================================
(function() {
  const tbody = document.getElementById('logTableBody');
  const sorted = [...WORK_LOGS].sort((a, b) =>
    parseDate(b.StartDateTime) - parseDate(a.StartDateTime)
  );

  sorted.forEach(log => {
    const d = parseDate(log.StartDateTime);
    const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    const project = projectMap[log.ProjectCode];
    const color = project ? project.Color : '#999';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${dateStr}</td>
      <td>${log.Title}</td>
      <td><span class="project-badge" style="background:${color}">${log.ProjectName}</span></td>
      <td>${Number(log.DurationHours).toFixed(1)}h</td>
    `;
    tbody.appendChild(tr);
  });
})();
</script>

</body>
</html>
